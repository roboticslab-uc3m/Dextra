name: Continuous Integration

on:
  push:
    paths:
      - .github/workflows/ci.yml
      - 'Firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build Firmware
        run: |
          cd Firmware/Teensy40
          platformio run
